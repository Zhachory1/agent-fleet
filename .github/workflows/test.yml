name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: bash + jq versions
        run: |
          bash --version | head -1
          jq --version

      - name: syntax check
        run: |
          for f in install.sh lib/*.sh test/*.sh; do
            bash -n "$f" || { echo "FAIL: $f failed bash -n"; exit 1; }
          done

      - name: run tests
        run: |
          fail=0
          for t in test/test_*.sh; do
            echo "=== $t ==="
            bash "$t" || fail=1
          done
          exit $fail

      - name: overlay templates lint (issue #12 acceptance)
        # Per #12: PRs that add per-org overlay templates (issue #4) must go through
        # overlay.sh lint before merging. The lint is advisory — it always exits 0 — but
        # findings are printed in the CI log for reviewer attention. The example overlay
        # itself is exempt: it carries deliberate warning content that would otherwise
        # trip the lint's own patterns.
        run: |
          shopt -s nullglob
          for f in agents/_overlay.example/*.md; do
            echo "=== lint: $f ==="
            bash lib/overlay.sh lint "$f"
          done
          # Also lint the example file itself, but tolerate findings
          # (the file's threat-model preamble may trip the lint by design).
          if [ -f agents/_overlay.md.example ]; then
            echo "=== lint (informational): agents/_overlay.md.example ==="
            bash lib/overlay.sh lint agents/_overlay.md.example || true
          fi

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck (advisory)
        # advisory for now — wire into hard CI after issue #14's MAJOR item lands
        continue-on-error: true
        run: shellcheck -S warning lib/*.sh install.sh test/*.sh
